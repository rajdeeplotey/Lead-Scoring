<script>
  // Mobile menu toggle
  const mobileMenuBtn = document.getElementById('mobile-menu-btn');
  const mobileMenu = document.getElementById('mobile-menu');

  if (mobileMenuBtn && mobileMenu) {
    mobileMenuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
    });
  }

  // Highlight active page
  const currentPage = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.nav-link').forEach(link => {
    const page = link.getAttribute('data-page');
    if (page === currentPage.replace('.html', '')) {
      link.classList.add('gradient-text');
      link.classList.remove('text-gray-700');
    }
  });

  // Scroll shadow and blur effect (throttled for performance)
  const navbar = document.getElementById('navbar');
  if (navbar) {
    let scrollTimeout;
    window.addEventListener('scroll', () => {
      if (scrollTimeout) return;
      scrollTimeout = setTimeout(() => {
        scrollTimeout = null;
        if (window.scrollY > 10) {
          navbar.classList.add('shadow-lg', 'backdrop-blur-md');
        } else {
          navbar.classList.remove('shadow-lg', 'backdrop-blur-md');
        }
      }, 16); // ~60fps throttling
    });
  }
</script>
